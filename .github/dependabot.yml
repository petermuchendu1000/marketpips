# .github/dependabot.yml — automated dependency updates (Module 17.7 maintenance
# cadence). Keeps npm, GitHub Actions, and Docker deps patched with a weekly PR
# cadence; security updates are raised immediately by GitHub. Grouped to reduce
# PR noise; CI (lint/type-check/unit/build/security/a11y/i18n) gates every PR.
version: 2
updates:
  # Application dependencies (npm workspace root resolves apps/web via lockfile).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "npm"]
    groups:
      # Batch low-risk minor/patch bumps into one PR.
      minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      # Majors reviewed deliberately (framework upgrades are risky here).
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  # CI/CD workflow actions.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "github-actions"]

  # Container base image.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "docker"]
