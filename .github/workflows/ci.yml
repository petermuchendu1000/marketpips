# MarketPips CI — quality gates (Module 16.1)
# lint / type-check / unit run in parallel, then build (+ bundle budget),
# migration-lint, and security scans. Docs-only PRs skip the heavy jobs.
name: MarketPips CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel superseded runs for the same ref (saves CI minutes on rapid pushes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  # ------------------------------------------------------------------
  # Change detection — lets docs-only changes skip the heavy pipeline.
  # ------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'apps/**'
              - 'scripts/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/**'
              - 'Dockerfile'
              - 'fly.toml'
            migrations:
              - 'supabase/migrations/**'
              - 'scripts/lint_migrations.py'

  # ------------------------------------------------------------------
  # Parallel quality gates.
  # ------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint

  type-check:
    name: Type check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run type-check

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run --workspace apps/web test

  # ------------------------------------------------------------------
  # Build + performance budget (needs the quality gates green).
  # ------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check, unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Restore Next build cache
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: next-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('apps/web/**/*.[jt]s', 'apps/web/**/*.[jt]sx') }}
          restore-keys: |
            next-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            next-${{ runner.os }}-
      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        run: npm run build 2>&1 | tee build.log
      - name: Bundle-size budget (first-load JS)
        env:
          BUNDLE_BUDGET_KB: '130'
        run: node scripts/check-bundle-budget.mjs build.log

  # ------------------------------------------------------------------
  # DB migration lint (naming/numbering/parse/destructive opt-in).
  # ------------------------------------------------------------------
  migration-lint:
    name: Migration lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.migrations == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install "pglast>=6,<8"
      - run: python scripts/lint_migrations.py supabase/migrations

  # ------------------------------------------------------------------
  # Security scans. npm audit + dependency review are non-blocking for
  # now (baseline collection); gitleaks (secret scanning) is blocking.
  # NOTE: never run `npm audit fix --force` — see docs/DEPLOYMENT.md.
  # ------------------------------------------------------------------
  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: npm audit (high+) — non-blocking baseline
        continue-on-error: true
        run: npm audit --audit-level=high
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # ------------------------------------------------------------------
  # Lighthouse CI (performance/a11y budgets) — non-blocking baseline.
  # ------------------------------------------------------------------
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        run: npm run build
      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.14.x
          npm --workspace apps/web run start &
          npx --yes wait-on http://localhost:3000 -t 60000
          lhci autorun --config=./lighthouserc.json || true
