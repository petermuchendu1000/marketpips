# Terraform IaC pipeline (Module 16.4)
# PR: fmt-check + validate + plan (posted as a comment). main: gated apply via
# the "infra" GitHub Environment (required reviewers). Nightly: drift detection.
name: Terraform

on:
  pull_request:
    branches: [main]
    paths: ['infra/terraform/**', '.github/workflows/terraform.yml']
  push:
    branches: [main]
    paths: ['infra/terraform/**']
  schedule:
    - cron: '17 3 * * *'   # nightly drift detection
  workflow_dispatch:

concurrency:
  group: terraform
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    working-directory: infra/terraform

env:
  TF_IN_AUTOMATION: 'true'
  TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
  TF_VAR_domain: ${{ secrets.MARKETPIPS_DOMAIN }}
  TF_VAR_fly_api_token: ${{ secrets.FLY_API_TOKEN }}

jobs:
  plan:
    name: Validate & Plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
      - run: terraform fmt -check -recursive
      - run: terraform init -input=false
      - run: terraform validate -no-color
      - name: Plan
        id: plan
        run: terraform plan -input=false -no-color
      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `#### Terraform Plan 📖\n\`\`\`\n${{ toJSON(steps.plan.outputs.stdout) }}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body.slice(0, 65000),
            });

  apply:
    name: Apply (gated)
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: infra            # <-- required reviewers configured in repo settings
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
      - run: terraform init -input=false
      - run: terraform apply -input=false -auto-approve
