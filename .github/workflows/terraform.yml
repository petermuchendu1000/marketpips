# Terraform IaC pipeline (Module 16.4)
# PR: fmt-check + validate + plan (posted as a comment). main: gated apply via
# the "infra" GitHub Environment (required reviewers). Nightly: drift detection.
name: Terraform

on:
  pull_request:
    branches: [main]
    paths: ['infra/terraform/**', '.github/workflows/terraform.yml']
  push:
    branches: [main]
    paths: ['infra/terraform/**']
  schedule:
    - cron: '17 3 * * *'   # nightly drift detection
  workflow_dispatch:

concurrency:
  group: terraform
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    working-directory: infra/terraform

env:
  TF_IN_AUTOMATION: 'true'
  TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
  TF_VAR_domain: ${{ secrets.MARKETPIPS_DOMAIN }}
  TF_VAR_fly_api_token: ${{ secrets.FLY_API_TOKEN }}

jobs:
  plan:
    name: Validate & Plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
      # fmt needs no backend/secrets — always enforce canonical formatting.
      - run: terraform fmt -check -recursive
      # The remote backend (Terraform Cloud org "marketpips") requires
      # TF_API_TOKEN. Until the repo is wired to that org + cloud provider
      # tokens, skip init/validate/plan instead of reporting a false-red
      # failure. The moment TF_API_TOKEN is added as a repo secret, the full
      # pipeline runs automatically.
      - name: Check backend credentials
        id: creds
        run: |
          if [ -n "${{ secrets.TF_API_TOKEN }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Terraform::TF_API_TOKEN not set — skipping init/validate/plan (fmt still enforced). Add the secret to enable full IaC checks."
          fi
      - if: steps.creds.outputs.configured == 'true'
        run: terraform init -input=false
      - if: steps.creds.outputs.configured == 'true'
        run: terraform validate -no-color
      - name: Plan
        id: plan
        if: steps.creds.outputs.configured == 'true'
        run: terraform plan -input=false -no-color
      - name: Comment plan on PR
        if: github.event_name == 'pull_request' && steps.creds.outputs.configured == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `#### Terraform Plan 📖\n\`\`\`\n${{ toJSON(steps.plan.outputs.stdout) }}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body.slice(0, 65000),
            });

  apply:
    name: Apply (gated)
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: infra            # <-- required reviewers configured in repo settings
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
      - name: Check backend credentials
        id: creds
        run: |
          if [ -n "${{ secrets.TF_API_TOKEN }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Terraform::TF_API_TOKEN not set — skipping apply. Add the secret to enable gated applies."
          fi
      - if: steps.creds.outputs.configured == 'true'
        run: terraform init -input=false
      - if: steps.creds.outputs.configured == 'true'
        run: terraform apply -input=false -auto-approve
