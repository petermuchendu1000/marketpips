project_id = "marketpips"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true
ip_version = "IPv4"
max_header_length = 4096

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.image_transformation]
enabled = true

[auth]
enabled = true
# The base URL of your website. Used as an allow-list for redirects and for constructing URLs used
# in emails.
site_url = "http://127.0.0.1:3000"
# A list of *exact* URLs that auth providers are permitted to redirect to post authentication.
additional_redirect_urls = ["https://127.0.0.1:3000"]
# How long tokens are valid for, in seconds. Defaults to 3600 (1 hour), maximum 604,800 (1 week).
jwt_expiry = 3600
# If disabled, the refresh token will never expire.
enable_refresh_token_rotation = true
# Allows refresh tokens to be reused after expiry, up to the specified interval in seconds.
# Requires enable_refresh_token_rotation = true.
refresh_token_reuse_interval = 10
# Allow/disallow new user signups to your project.
enable_signup = true
# Allow/disallow anonymous sign-ins to your project.
enable_anonymous_sign_ins = false

[auth.email]
# Allow/disallow new user signups via email to your project.
enable_signup = true
# If enabled, a user will be required to confirm any email change on both the old, and new email
# addresses. If disabled, only the new email is required to confirm.
double_confirm_changes = true
# If enabled, users need to confirm their email address before signing in.
enable_confirmations = true

[auth.sms]
# Allow/disallow new user signups via SMS to your project.
enable_signup = true
enable_confirmations = false

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
# Overrides the default auth redirectUrl.
redirect_uri = ""
# The base URL used for constructing the URLs to request authorization and fetch access tokens.
url = ""

[analytics]
enabled = false
port = 54327
backend = "postgres"

# ============================================================
# BACKGROUND JOBS (Module 12)
# ============================================================
# The four background workers are now Next.js route handlers under
# apps/web/app/api/cron/* (CRON_SECRET-gated), backed by atomic service-role
# RPCs (migration 016). They supersede the old Deno edge functions, which have
# been removed to keep a single, tested code path.
#
# Scheduling is done with pg_cron + pg_net calling those HTTP endpoints. Enable
# the pg_cron and pg_net extensions (Dashboard > Database > Extensions), then run
# ONCE per environment from the SQL editor (secret never lives in a migration):
#
#   SELECT public.schedule_marketpips_jobs('https://<app-domain>', '<CRON_SECRET>');
#
# Cadence (see docs/12-BACKGROUND-JOBS.md):
#   close-markets:          */5 * * * *   (every 5 minutes)
#   resolve-market:         */15 * * * *  (every 15 minutes)
#   update-exchange-rates:  0 */6 * * *   (every 6 hours)
#   send-notifications:     * * * * *     (every minute)

[storage.buckets.kyc-documents]
public = false
file_size_limit = "5MiB"
allowed_mime_types = ["image/jpeg", "image/png", "application/pdf"]

[storage.buckets.market-covers]
public = true
file_size_limit = "2MiB"
allowed_mime_types = ["image/jpeg", "image/png", "image/webp"]
